<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorshipCast - TV Display</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lato:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            /* Default font, will be overridden */
            font-family: 'Inter', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #lyrics-container {
            width: 90%;
            height: 90%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            transition: padding-top 0.16s ease;
        }

        body.ref-visible #lyrics-container {
            padding-top: 28px;
        }

        .lyric-line {
            font-size: 8vw; /* Large fluid typography for TV */
            font-weight: bold;
            line-height: 1.25;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            white-space: pre-wrap;
            max-width: 100%;
            max-height: 100%;
        }

        .presented-image {
            max-width: 98%;
            max-height: 98%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 10px;
        }

        .quick-fade {
            animation: quickFade 0.14s ease-out;
        }

        @keyframes quickFade {
            from { opacity: 0.62; }
            to { opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.3);
        }

        #verse-reference {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.92);
            font-size: 2.2vw;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.85);
            display: none;
            text-align: center;
            max-width: 92vw;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-bottom: 12px;
        }
    </style>
</head>
<body>

    <div id="lyrics-container">
        <!-- Lyrics will be injected here -->
        <div class="lyric-line" style="color: #666; font-size: 4vw;">Waiting for presentation...</div>
        <div id="room-code-display" style="color: #444; font-size: 3vw; margin-top: 20px;">Room Code: <span id="room-code-val">...</span></div>
    </div>

    <div id="verse-reference"></div>

    <div id="status">Connecting...</div>

    <script>
        const lyricsContainer = document.getElementById('lyrics-container');
        const statusElement = document.getElementById('status');
        const verseReferenceElement = document.getElementById('verse-reference');

        // Connect to the WebSocket server running on the same host and port
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        // When running locally, often the TV is on another device on the network,
        // so we need the actual IP instead of localhost. But for the initial connection let's use the host.
        const wsUrl = `${protocol}//${window.location.host}`;
        
        // For development outside the browser serving it, you might need to hardcode the IP:
        // const wsUrl = 'ws://YOUR_LOCAL_IP:3000';

        // Extract room ID from URL query params
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'default';
        document.getElementById('room-code-val').innerText = roomId;

        let ws;

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('Connected to WebSocket server');
                // Hide reconnecting status if any
                statusElement.innerText = 'Connected to Room: ' + roomId;
                statusElement.style.color = 'rgba(0, 255, 0, 0.5)';
                
                // Join room
                ws.send(JSON.stringify({ type: 'join', room: roomId }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('Received message:', data);

                if (data.type === 'present') {
                    // Hide the room code display once presentation starts
                    const roomDisplay = document.getElementById('room-code-display');
                    if (roomDisplay) roomDisplay.style.display = 'none';
                    statusElement.style.display = 'none'; // Also hide the connected status text to be clean

                    if (data.imageData) {
                        verseReferenceElement.style.display = 'none';
                        verseReferenceElement.innerText = '';
                        document.body.classList.remove('ref-visible');
                        displayImage(data.imageData, data.imageSize);
                        return;
                    }

                    if (data.reference) {
                        verseReferenceElement.innerText = data.reference;
                        verseReferenceElement.style.display = 'block';
                        document.body.classList.add('ref-visible');
                    } else {
                        verseReferenceElement.style.display = 'none';
                        verseReferenceElement.innerText = '';
                        document.body.classList.remove('ref-visible');
                    }
                    
                    // Apply font if sent
                    if (data.font) {
                        lyricsContainer.style.fontFamily = data.font;
                    }

                    displayLyrics(data.text, data.fontSize);
                } else if (data.type === 'present-image') {
                    const roomDisplay = document.getElementById('room-code-display');
                    if (roomDisplay) roomDisplay.style.display = 'none';
                    statusElement.style.display = 'none';
                    verseReferenceElement.style.display = 'none';
                    verseReferenceElement.innerText = '';
                    document.body.classList.remove('ref-visible');

                    displayImage(data.imageData, data.imageSize);
                } else if (data.type === 'clear') {
                    lyricsContainer.innerHTML = '';
                    currentElement = null;
                    currentImageElement = null;
                    verseReferenceElement.style.display = 'none';
                    verseReferenceElement.innerText = '';
                    document.body.classList.remove('ref-visible');
                    statusElement.style.display = 'none';
                } else if (data.type === 'status' || data.type === 'error') {
                    console.log('Server message:', data.message);
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected. Attempting to reconnect...');
                statusElement.style.display = 'block';
                statusElement.innerText = 'Disconnected - Reconnecting...';
                statusElement.style.color = 'rgba(255, 0, 0, 0.5)';
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
        }

        let currentElement = null;
        let currentFontSizeType = 'auto';
        let currentImageElement = null;
        let currentImageSizeType = 'auto';

        function runQuickTransition(element) {
            if (!element) return;
            element.classList.remove('quick-fade');
            void element.offsetWidth;
            element.classList.add('quick-fade');
        }

        function displayLyrics(text, fontSize) {
            currentFontSizeType = fontSize || 'auto';

            // Remove image view only when switching modes; avoid full clear flicker for text-to-text transitions.
            if (currentImageElement) {
                lyricsContainer.innerHTML = '';
                currentImageElement = null;
                currentElement = null;
            }

            if (!currentElement) {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                lyricsContainer.innerHTML = '';
                lyricsContainer.appendChild(div);
                currentElement = div;
            }

            currentElement.innerText = text || '';
            runQuickTransition(currentElement);

            applyFontSize();
        }

        function displayImage(imageData, imageSize) {
            currentImageSizeType = imageSize || 'auto';

            // Remove lyric view only when switching modes; avoid full clear flicker for image-to-image transitions.
            if (currentElement) {
                lyricsContainer.innerHTML = '';
                currentElement = null;
                currentImageElement = null;
            }

            if (!currentImageElement) {
                const img = document.createElement('img');
                img.className = 'presented-image';
                img.alt = 'Presented image';
                lyricsContainer.innerHTML = '';
                lyricsContainer.appendChild(img);
                currentImageElement = img;
            }

            currentImageElement.src = imageData || '';
            runQuickTransition(currentImageElement);

            applyImageSize();
        }

        function applyFontSize() {
            if (!currentElement) return;

            if (currentFontSizeType === 'auto') {
                autoFit(currentElement);
            } else {
                const parsed = parseFloat(String(currentFontSizeType));
                if (!Number.isNaN(parsed) && parsed > 0) {
                    // Intelligent behavior: treat selected size as a preferred maximum,
                    // and automatically reduce only when content would overflow.
                    const requestedPx = (window.innerWidth * parsed) / 100;
                    autoFit(currentElement, requestedPx);
                } else {
                    currentFontSizeType = 'auto';
                    autoFit(currentElement);
                }
            }
        }

        function applyImageSize() {
            if (!currentImageElement) return;

            if (currentImageSizeType === 'auto') {
                currentImageElement.style.width = 'auto';
                currentImageElement.style.height = 'auto';
                currentImageElement.style.maxWidth = '98%';
                currentImageElement.style.maxHeight = '98%';
                return;
            }

            const parsed = parseFloat(String(currentImageSizeType));
            if (!Number.isNaN(parsed) && parsed > 0) {
                const clamped = Math.max(10, Math.min(200, parsed));
                currentImageElement.style.width = `${clamped}%`;
                currentImageElement.style.height = 'auto';
                currentImageElement.style.maxWidth = 'none';
                currentImageElement.style.maxHeight = 'none';
            } else {
                currentImageSizeType = 'auto';
                applyImageSize();
            }
        }

        function autoFit(element, maxPxCap) {
            const boxWidth = lyricsContainer.clientWidth;
            const boxHeight = lyricsContainer.clientHeight;
            if (!boxWidth || !boxHeight) return;

            const maxH = boxHeight * 0.98;
            const minPx = 18;
            let low = minPx;
            const naturalHigh = Math.max(30, Math.floor(boxHeight * 0.34));
            // For manual font size, honor presenter-selected size as the upper bound,
            // then shrink only when needed to fit screen.
            const cappedHigh = Number.isFinite(maxPxCap) && maxPxCap > 0
                ? Math.floor(maxPxCap)
                : naturalHigh;
            let high = Math.max(minPx, cappedHigh);
            let best = minPx;

            const applyAutoStyles = (sizePx) => {
                element.style.fontSize = `${sizePx}px`;
                element.style.lineHeight = '1.25';
                element.style.marginBottom = '0px';
            };

            lyricsContainer.style.overflow = 'hidden';

            // Binary search to find the largest readable size that still fits.
            while (low <= high) {
                const mid = Math.floor((low + high) / 2);
                applyAutoStyles(mid);

                if (element.scrollHeight <= maxH) {
                    best = mid;
                    low = mid + 1;
                } else {
                    high = mid - 1;
                }
            }

            applyAutoStyles(best);
        }

        function recalcAutoFontSoon() {
            if (currentFontSizeType !== 'auto') return;
            requestAnimationFrame(() => {
                requestAnimationFrame(() => applyFontSize());
            });
        }

        // Re-calculate font on viewport changes
        window.addEventListener('resize', () => {
            if (currentFontSizeType === 'auto') {
                applyFontSize();
            }
            if (currentImageSizeType === 'auto') {
                applyImageSize();
            }
        });
        window.addEventListener('orientationchange', recalcAutoFontSoon);
        document.addEventListener('fullscreenchange', recalcAutoFontSoon);
        document.addEventListener('webkitfullscreenchange', recalcAutoFontSoon);

        // Initialize connection
        connectWebSocket();
    </script>
</body>
</html>
